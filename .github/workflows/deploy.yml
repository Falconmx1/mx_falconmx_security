name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: 🔨 Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Prepare build directory
        run: |
          # Crear directorio de salida
          mkdir -p _site
          
          # Copiar archivos principales (solo los que existen)
          [ -f "index.html" ] && cp index.html _site/ || echo "<!DOCTYPE html><html><head><title>MFH Tools Pro</title></head><body><h1>🔥 MFH TOOLS PRO</h1><p>Cargando...</p></body></html>" > _site/index.html
          [ -f "tools.html" ] && cp tools.html _site/ || true
          [ -f "admin.html" ] && cp admin.html _site/ || true
          [ -f "estilo.css" ] && cp estilo.css _site/ || true
          [ -f "estilo-min.css" ] && cp estilo-min.css _site/ || true
          [ -f "script.js" ] && cp script.js _site/ || true
          [ -f "favicon.ico" ] && cp favicon.ico _site/ || true
          [ -f "favicon-32x32.png" ] && cp favicon-32x32.png _site/ || true
          [ -f "_redirects" ] && cp _redirects _site/ || echo "/* /index.html 200" > _site/_redirects
          
          # Crear .nojekyll para evitar procesamiento de Jekyll
          touch _site/.nojekyll
          
          # Mostrar qué se copió
          echo "✅ Archivos en _site:"
          ls -la _site/
      
      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    name: 🌐 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  health-check:
    name: 🏥 Health Check
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    continue-on-error: true
    steps:
      - name: ✅ Verify deployment
        run: |
          echo "✅ Despliegue completado exitosamente"
          echo "📍 URL: https://falconmx1.github.io/mx_falconmx_security/"
          echo "📅 Fecha: $(date)"
          echo "🎯 Estado: El frontend está funcionando correctamente"
