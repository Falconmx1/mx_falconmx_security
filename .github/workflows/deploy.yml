name: 🚀 Deploy to Production

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Permite ejecutar manualmente

env:
  NODE_VERSION: '18.x'

jobs:
  test-and-build:
    name: 🔍 Test & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: 📦 Install dependencies
        run: npm ci
      
      - name: 🧪 Run security audit
        run: npm audit --production || echo "⚠️ Audit issues found but continuing"
      
      - name: 📝 Lint check (if available)
        run: |
          if [ -f package.json ] && grep -q '"lint"' package.json; then
            npm run lint
          else
            echo "No lint script found, skipping"
          fi
      
      - name: 💾 Cache build artifacts
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            .next/cache
          key: ${{ runner.os }}-build-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-

  deploy-backend:
    name: ☁️ Deploy Backend to Railway
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: 📦 Install Railway CLI
        run: npm install -g @railway/cli
      
      - name: 🚀 Deploy to Railway
        run: railway up --service=mfh-tools-backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      
      - name: 🔧 Set environment variables
        run: |
          railway variables set NODE_ENV="production"
          railway variables set HIBP_API_KEY="${{ secrets.HIBP_API_KEY }}"
          railway variables set DATABASE_URL="/app/data/mfh_tools.db"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend:
    name: 🌐 Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: 🔧 Build frontend assets
        run: |
          # Crear versión optimizada para producción
          if [ -f "package.json" ] && grep -q '"build"' package.json; then
            npm run build
          else
            echo "No build script found, using static files"
          fi
          # Asegurar que index.html existe
          if [ ! -f "index.html" ]; then
            echo "<h1>MFH Tools Pro</h1><p>Redirecting...</p><script>location.href='/tools.html'</script>" > index.html
          fi
      
      - name: 📁 Prepare Pages artifact
        run: |
          mkdir -p ./_site
          cp -r *.html *.css *.js *.json *.png *.ico _redirects ./_site 2>/dev/null || true
          cp -r tools workers assets ./_site 2>/dev/null || true
          # Asegurar que _redirects existe
          echo "/* /index.html 200" > ./_site/_redirects
          echo "/api/* https://mfh-tools-backend.up.railway.app/api/:splat 200" >> ./_site/_redirects
      
      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
      
      - name: 🚀 Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  health-check:
    name: 🏥 Health Check
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    
    steps:
      - name: 🌍 Wait for deployment
        run: sleep 30
      
      - name: 🔍 Check backend health
        run: |
          BACKEND_URL="https://mfh-tools-backend.up.railway.app/health"
          echo "Checking $BACKEND_URL..."
          curl -f $BACKEND_URL || echo "⚠️ Backend health check failed"
      
      - name: 🔍 Check frontend
        run: |
          FRONTEND_URL="https://falconmx1.github.io/mx_falconmx_security/"
          echo "Checking $FRONTEND_URL..."
          curl -f $FRONTEND_URL || echo "⚠️ Frontend check failed"
      
      - name: ✅ Deployment summary
        run: |
          echo "## 🎉 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: https://falconmx1.github.io/mx_falconmx_security/" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: https://mfh-tools-backend.up.railway.app" >> $GITHUB_STEP_SUMMARY
          echo "- API Docs: https://mfh-tools-backend.up.railway.app/docs" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
