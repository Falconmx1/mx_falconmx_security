<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - MFH TOOLS PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #e0e0e0;
            transition: all 0.3s ease;
        }
        body.light-mode {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            color: #1a1a1a;
        }
        body.light-mode .navbar { background: rgba(255,255,255,0.95); border-bottom: 1px solid rgba(0,0,0,0.1); }
        body.light-mode .card { background: rgba(255,255,255,0.95); border-color: rgba(0,0,0,0.1); }
        body.light-mode .form-control { background: #fff; color: #1a1a1a; border-color: #ccc; }
        body.light-mode footer { background: rgba(255,255,255,0.95); border-top-color: rgba(0,0,0,0.1); }
        
        .navbar {
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,255,0,0.3);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 8px 0;
        }
        .navbar-brand {
            font-weight: 800;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #00ff00, #00cc00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .navbar .nav-link { color: #e0e0e0 !important; font-size: 0.85rem; }
        .navbar .nav-link:hover { color: #00ff00 !important; }
        .theme-toggle { cursor: pointer; font-size: 1.2rem; transition: all 0.3s ease; }
        .theme-toggle:hover { transform: rotate(180deg); }
        
        .card {
            background: rgba(20,20,20,0.95);
            border: 1px solid rgba(0,255,0,0.15);
            border-radius: 12px;
        }
        .form-control {
            background: #0a0a0a;
            border: 1px solid rgba(0,255,0,0.3);
            color: #e0e0e0;
            border-radius: 8px;
        }
        .form-control:focus {
            border-color: #00ff00;
            box-shadow: 0 0 8px rgba(0,255,0,0.3);
            outline: none;
        }
        .btn-mfh {
            background: linear-gradient(135deg, #00ff00, #00cc00);
            border: none;
            color: #000;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .btn-mfh:hover { transform: scale(1.02); box-shadow: 0 0 12px rgba(0,255,0,0.4); }
        .btn-donate {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            color: #fff;
            font-weight: 700;
            padding: 6px 18px;
            border-radius: 50px;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            animation: pulse-donate 2s ease-in-out infinite;
        }
        .btn-donate:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(238,90,36,0.5); color: #fff; }
        @keyframes pulse-donate {
            0%,100% { box-shadow: 0 0 10px rgba(238,90,36,0.3); }
            50% { box-shadow: 0 0 25px rgba(238,90,36,0.6); }
        }
        
        footer { background: rgba(0,0,0,0.95); border-top: 1px solid rgba(0,255,0,0.2); padding: 20px 0 15px; margin-top: 30px; }
        footer a { color: #e0e0e0; text-decoration: none; font-size: 0.85rem; }
        footer a:hover { color: #00ff00; }
        .text-success-mfh { color: #00ff00; }
        
        @media (max-width: 768px) { .navbar-brand { font-size: 1rem; } }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="fas fa-shield-haltered me-2"></i>MFH TOOLS PRO</a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <a href="/aviso-legal.html" class="btn btn-sm btn-outline-mfh d-none d-md-inline"><i class="fas fa-gavel me-1"></i>Legal</a>
            <a href="/donar.html" class="btn btn-sm btn-donate"><i class="fas fa-heart me-1"></i>Donar</a>
            <i class="fas fa-sun theme-toggle" id="themeToggle"></i>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="/#herramientas">Herramientas</a></li>
                <li class="nav-item"><a class="nav-link" href="/marketplace.html">Marketplace</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 pt-5">
    <div class="row">
        <div class="col-lg-6 mx-auto">
            <div class="card p-4">
                <h1 class="text-center text-success-mfh"><i class="fas fa-envelope me-2"></i>Contacto</h1>
                <p class="text-center text-muted">¿Preguntas, sugerencias o reportes? Escríbenos</p>
                <hr class="bg-success">
                
                <form id="contactForm" onsubmit="sendContact(event)">
                    <div class="mb-3">
                        <label class="form-label">Nombre completo</label>
                        <input type="text" class="form-control" id="contactName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" id="contactEmail" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Asunto</label>
                        <select class="form-select" id="contactSubject">
                            <option>Reportar error</option>
                            <option>Sugerencia de herramienta</option>
                            <option>Colaboración</option>
                            <option>Otro</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mensaje</label>
                        <textarea class="form-control" id="contactMessage" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn-mfh w-100"><i class="fas fa-paper-plane me-2"></i>Enviar mensaje</button>
                </form>
                <div id="contactResponse" class="mt-3 text-center"></div>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container text-center">
        <div class="d-flex justify-content-center gap-3">
            <a href="/">Inicio</a>
            <a href="/aviso-legal.html">Aviso Legal</a>
            <a href="/contacto.html">Contacto</a>
        </div>
        <p class="small mt-2">© 2025 MFH TOOLS PRO - Todos los derechos reservados</p>
    </div>
</footer>

<script>
const themeToggle = document.getElementById('themeToggle');
const body = document.body;
if (localStorage.getItem('theme') === 'light') {
    body.classList.add('light-mode');
    themeToggle.classList.remove('fa-sun');
    themeToggle.classList.add('fa-moon');
}
themeToggle.addEventListener('click', () => {
    body.classList.toggle('light-mode');
    const isLight = body.classList.contains('light-mode');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
    if (isLight) {
        themeToggle.classList.remove('fa-sun');
        themeToggle.classList.add('fa-moon');
    } else {
        themeToggle.classList.remove('fa-moon');
        themeToggle.classList.add('fa-sun');
    }
});

function sendContact(e) {
    e.preventDefault();
    const name = document.getElementById('contactName').value;
    const email = document.getElementById('contactEmail').value;
    const subject = document.getElementById('contactSubject').value;
    const message = document.getElementById('contactMessage').value;
    
    document.getElementById('contactResponse').innerHTML = `
        <div class="alert alert-success">
            <i class="fas fa-check-circle me-2"></i>
            ¡Mensaje enviado!<br>
            <small class="text-muted">${name}, te responderemos pronto a ${email}</small>
        </div>
    `;
    document.getElementById('contactForm').reset();
}
</script>
</body>
</html>
