<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MFH - OSINT Email Recon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0a0a0a, #1a1a1a); color: #e0e0e0; font-family: 'Inter', sans-serif; }
    .tool-card { background: rgba(20,20,20,0.95); border: 2px solid rgba(0,255,0,0.3); border-radius: 20px; padding: 25px; margin-top: 30px; }
    .result-card { background: #0a0a0a; border: 1px solid #00ff00; border-radius: 10px; padding: 15px; margin-top: 15px; }
    .btn-mfh { background: linear-gradient(135deg, #00ff00, #00cc00); border: none; color: #000; font-weight: 600; padding: 10px 25px; border-radius: 8px; }
    .badge-breach { background: #dc3545; color: white; }
    .badge-clean { background: #00ff00; color: black; }
  </style>
</head>
<body>
<div class="container">
  <div class="tool-card">
    <h2 class="text-center glow-text"><i class="fas fa-eye me-2"></i>OSINT Email Reconnaissance</h2>
    <p class="text-center">Recolección de inteligencia OSINT sobre direcciones de correo electrónico</p>
    
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="input-group mb-3">
          <input type="email" id="emailInput" class="form-control" placeholder="ejemplo@dominio.com">
          <button class="btn-mfh" onclick="searchEmail()"><i class="fas fa-search me-1"></i>Investigar</button>
        </div>
        
        <div id="results" style="display: none;">
          <div class="result-card">
            <h5><i class="fas fa-info-circle me-2"></i>Información del Dominio</h5>
            <div id="domainInfo"></div>
          </div>
          <div class="result-card">
            <h5><i class="fas fa-database me-2"></i>Breaches de Datos</h5>
            <div id="breachInfo"></div>
          </div>
          <div class="result-card">
            <h5><i class="fas fa-envelope me-2"></i>Verificación de Email</h5>
            <div id="verifyInfo"></div>
          </div>
        </div>
        
        <div id="loading" class="text-center mt-3" style="display: none;">
          <div class="spinner-border text-success"></div>
          <p>Recopilando información OSINT...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API_KEYS = {
  hunter: '', // Opcional: consigue gratis en hunter.io
  emailrep: '', // Opcional: emailrep.io
};

async function searchEmail() {
  const email = document.getElementById('emailInput').value;
  if (!email || !email.includes('@')) {
    alert('Ingresa un email válido (ejemplo@dominio.com)');
    return;
  }
  
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  
  const domain = email.split('@')[1];
  
  // 1. Información del dominio (Whois local)
  const domainInfo = await getDomainInfo(domain);
  
  // 2. Breaches usando API pública de HaveIBeenPwned
  const breachData = await checkBreaches(email);
  
  // 3. Verificación de email
  const verifyData = await verifyEmail(email);
  
  // Mostrar resultados
  document.getElementById('domainInfo').innerHTML = `
    <p><strong>📧 Dominio:</strong> ${domain}</p>
    <p><strong>🏢 Organización:</strong> ${domainInfo.organization || 'No disponible'}</p>
    <p><strong>📍 País:</strong> ${domainInfo.country || 'No disponible'}</p>
    <p><strong>📅 Creación:</strong> ${domainInfo.creationDate || 'No disponible'}</p>
  `;
  
  document.getElementById('breachInfo').innerHTML = breachData.breaches.length > 0 
    ? `<span class="badge-badge-breach">⚠️ ${breachData.breaches.length} breaches encontrados</span>
       <ul>${breachData.breaches.map(b => `<li>${b.Name} - ${b.BreachDate}</li>`).join('')}</ul>`
    : `<span class="badge-clean">✅ No se encontraron breaches públicos</span>`;
  
  document.getElementById('verifyInfo').innerHTML = `
    <p><strong>📬 Email:</strong> ${email}</p>
    <p><strong>✅ Formato:</strong> ${verifyData.formatValid ? 'Válido' : 'Inválido'}</p>
    <p><strong>🔍 MX Records:</strong> ${verifyData.hasMx ? 'Sí' : 'No'}</p>
    <p><strong>🛡️ Disposable:</strong> ${verifyData.isDisposable ? '⚠️ Sí (email temporal)' : 'No'}</p>
  `;
  
  document.getElementById('results').style.display = 'block';
  document.getElementById('loading').style.display = 'none';
}

async function getDomainInfo(domain) {
  try {
    const response = await fetch(`https://whoisjson.com/api/v1/whois?domain=${domain}`);
    const data = await response.json();
    return {
      organization: data.registrar?.organization || data.org,
      country: data.country,
      creationDate: data.creationDate
    };
  } catch(e) {
    return { organization: null, country: null, creationDate: null };
  }
}

async function checkBreaches(email) {
  try {
    const response = await fetch(`https://haveibeenpwned.com/api/v3/breachedaccount/${encodeURIComponent(email)}`, {
      headers: { 'hibp-api-key': '' } // Opcional: consigue API key gratis
    });
    if (response.status === 404) return { breaches: [] };
    const breaches = await response.json();
    return { breaches };
  } catch(e) {
    return { breaches: [] };
  }
}

async function verifyEmail(email) {
  // Verificación local
  const formatValid = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/.test(email);
  const domain = email.split('@')[1];
  let hasMx = false;
  let isDisposable = false;
  
  // Lista de dominios temporales comunes
  const disposableDomains = ['tempmail.com', '10minutemail.com', 'guerrillamail.com', 'mailinator.com', 'throwaway.email'];
  isDisposable = disposableDomains.includes(domain);
  
  // Verificación MX (simulada por ahora, en backend real sería con DNS)
  hasMx = true; // En producción, hacer consulta DNS real
  
  return { formatValid, hasMx, isDisposable };
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
